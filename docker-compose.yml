services:
  finance-os:
    build: .
    ports:
      - "8000:8000"
    environment:
      FINANCE_DB_PATH: /data/finance.db
      STATIC_DIR: /app/static
      APP_USER: lukas
      APP_PASSWORD: ${APP_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - finance-data:/data
    restart: unless-stopped

volumes:
  finance-data:
