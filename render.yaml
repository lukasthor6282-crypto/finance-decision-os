services:
  - type: web
    name: finance-decision-os-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: APP_USER
        value: lukas
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
